# SwiftLint config — deliberately lenient to start (CI runs `swiftlint --strict`, which
# promotes warnings to errors, so anything enabled here must be clean). Tighten over time.
included:
  - Sources
  - Tests

disabled_rules:
  - todo                    # TODOs are fine in an actively-built codebase
  - trailing_comma          # SwiftFormat owns comma style

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 1             # allow x, r, m in math-heavy measurement code

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000
